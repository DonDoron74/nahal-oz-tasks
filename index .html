  { id: "team6", name: "", role: "team_lead", avatar: "👷", phone: "", title: "" },

const CATEGORIES = {

  maintenance: { label: "תחזוקה", color: "#2E7D5E", bg: "#E6F4EE", icon: "🔧" },
  hazard: { label: "פינוי מפגע", color: "#C0392B", bg: "#FDECEA", icon: "⚠️" },
  garden: { label: "גינון", color: "#4a7c3f", bg: "#eaf4e8", icon: "🌿" },

const WA_GROUP = "https://chat.whatsapp.com/DKErEQNlkjD4oVf3DgLg2N"; // קבוצת וואטסאפ שיקום נחל עוז

const PRIORITY = {
  high: { label: "דחוף", color: "#C0392B" },
  medium: { label: "רגיל", color: "#E07A2F" },

const STATUS = {
  open: { label: "פתוח", color: "#5B5EA6", bg: "#EEEEF8" },
  inprogress: { label: "בתהליך", color: "#E07A2F", bg: "#FDF0E6" },
  done: { label: "בוצע ✓", color: "#2E7D5E", bg: "#E6F4EE" },
};

const initialTasks = [
  { id: 1, title: "פינוי בידוד מחדר המוזיקה", description: "גשם חדר מוזיקה - יש לפנות בידוד רטוב לפני שייגרם נזק נוסף", category: "hazard", priority: "high", status: "open", assignedTo: null, createdBy: "manager", createdAt: "2024-01-15T08:30:00", project: "חדר מוזיקה", comments: [] },
  { id: 2, title: "שיפוץ מועדון לחבר - שלב א'", description: "החלפת ריצוף בכניסה למועדון", category: "construction", priority: "medium", status: "inprogress", assignedTo: "team1", createdBy: "manager", createdAt: "2024-01-14T10:00:00", project: "מועדון לחבר", comments: [{ id: 1, userId: "team1", text: "התחלנו לפרק את הריצוף הישן", createdAt: "2024-01-14T14:00:00" }] },
  { id: 3, title: "תיקון גדר בשביל הצפוני", description: "גדר שבורה מסכנת מעבר ילדים", category: "maintenance", priority: "high", status: "done", assignedTo: "team2", createdBy: "manager", createdAt: "2024-01-13T09:15:00", project: null, comments: [] },
  { id: 4, title: "ניקוי ביוב סמוך לחדר אוכל", description: "דיווח על ריח רע ועצירה בביוב", category: "hazard", priority: "high", status: "inprogress", assignedTo: "team3", createdBy: "manager", createdAt: "2024-01-15T07:00:00", project: null, comments: [] },
  { id: 5, title: "צביעת קיר חדר ילדים", description: "צביעה מחדש לפי בקשת הורים", category: "general", priority: "low", status: "open", assignedTo: null, createdBy: "manager", createdAt: "2024-01-12T11:00:00", project: null, comments: [] },
];

const fmt = (iso) => new Date(iso).toLocaleDateString("he-IL", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
const wa = (phone, msg) => window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
const card = { background: "#fff", borderRadius: "16px", padding: "18px", marginBottom: "14px", boxShadow: "0 2px 10px rgba(0,0,0,0.05)" };
const fBtn = (active, color, sm) => ({ whiteSpace: "nowrap", padding: sm ? "5px 11px" : "7px 14px", border: "none", borderRadius: "20px", fontSize: sm ? "12px" : "13px", fontWeight: "600", cursor: "pointer", background: active ? color : "#f5f6fa", color: active ? "#fff" : "#666", fontFamily: "'Rubik', sans-serif" });
const Label = ({ children }) => <div style={{ fontSize: "11px", fontWeight: "700", color: "#aaa", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "12px" }}>{children}</div>;

// ── EDIT FORM (standalone to prevent re-mount) ──
function EditUserForm({ form, setForm, onSave, onCancel, isNew }) {
  const [showEmoji, setShowEmoji] = useState(false);
  const uid = React.useId ? React.useId() : "euf";

  const handleName = React.useCallback(e => {
    setForm(p => ({ ...p, name: e.target.value }));
  }, [setForm]);
  const handleTitle = React.useCallback(e => {
    setForm(p => ({ ...p, title: e.target.value }));
  }, [setForm]);
  const handlePhone = React.useCallback(e => {
    setForm(p => ({ ...p, phone: e.target.value }));
  }, [setForm]);

  return (
    <div style={{ background: "#f8f9ff", borderRadius: "14px", padding: "16px", marginTop: "10px", border: "2px solid #e0e4ff" }}>
      <div style={{ marginBottom: "12px" }}>
        <div style={{ fontSize: "12px", fontWeight: "600", color: "#666", marginBottom: "8px" }}>אימוג'י</div>
        <button onClick={() => setShowEmoji(!showEmoji)} style={{ fontSize: "28px", background: "#fff", border: "2px solid #ddd", borderRadius: "12px", padding: "8px 14px", cursor: "pointer" }}>{form.avatar}</button>
        {showEmoji && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: "6px", marginTop: "8px", background: "#fff", padding: "10px", borderRadius: "12px", border: "1px solid #eee", maxWidth: "280px" }}>
            {EMOJI_OPTIONS.map(e => (
              <button key={e} onClick={() => { setForm(p => ({ ...p, avatar: e })); setShowEmoji(false); }}
                style={{ fontSize: "22px", background: form.avatar === e ? "#e8eeff" : "none", border: form.avatar === e ? "2px solid #5B5EA6" : "2px solid transparent", borderRadius: "8px", padding: "4px", cursor: "pointer" }}>{e}</button>
            ))}
          </div>
        )}
      </div>
      <div style={{ marginBottom: "10px" }}>
        <div style={{ fontSize: "12px", fontWeight: "600", color: "#666", marginBottom: "5px" }}>שם</div>
        <textarea
          rows="1"
          onChange={handleName}
          autoComplete="off" spellCheck="false"
          placeholder="שם מלא..."
          style={{ width: "100%", padding: "12px", border: "2px solid #c8d0ff", borderRadius: "10px", fontSize: "17px", fontFamily: "'Rubik',sans-serif", outline: "none", background: "#fff", direction: "rtl", resize: "none", overflow: "hidden" }}
        >{form.name}</textarea>
      </div>
      <div style={{ marginBottom: "10px" }}>
        <div style={{ fontSize: "12px", fontWeight: "600", color: "#666", marginBottom: "5px" }}>תפקיד (חופשי)</div>
        <textarea
          rows="1"
          onChange={handleTitle}
          autoComplete="off" spellCheck="false"
          placeholder="למשל: ראש צוות בינוי, מנהל, מתנדב..."
          style={{ width: "100%", padding: "12px", border: "2px solid #c8d0ff", borderRadius: "10px", fontSize: "17px", fontFamily: "'Rubik',sans-serif", outline: "none", background: "#fff", direction: "rtl", resize: "none", overflow: "hidden" }}
        >{form.title || ""}</textarea>
      </div>

      <div style={{ marginBottom: "14px" }}>
        <div style={{ fontSize: "12px", fontWeight: "600", color: "#666", marginBottom: "5px" }}>טלפון (לוואטסאפ)</div>
        <textarea
          rows="1"
          onChange={handlePhone}
          autoComplete="off"
          placeholder="972501234567"
          style={{ width: "100%", padding: "12px", border: "2px solid #c8d0ff", borderRadius: "10px", fontSize: "17px", fontFamily: "'Rubik',sans-serif", outline: "none", background: "#fff", resize: "none", overflow: "hidden" }}
        >{form.phone || ""}</textarea>
      </div>
      <div style={{ display: "flex", gap: "8px" }}>
        <button onClick={onSave} style={{ flex: 1, padding: "11px", background: "linear-gradient(135deg,#0f3460,#1a1a2e)", color: "#fff", border: "none", borderRadius: "10px", fontWeight: "700", fontSize: "14px", cursor: "pointer", fontFamily: "'Rubik',sans-serif" }}>
          {isNew ? "➕ הוסף" : "✅ שמור"}
        </button>
        <button onClick={onCancel} style={{ padding: "11px 16px", background: "#f0f0f0", color: "#666", border: "none", borderRadius: "10px", fontWeight: "600", fontSize: "14px", cursor: "pointer", fontFamily: "'Rubik',sans-serif" }}>ביטול</button>
      </div>
    </div>
  );
}

// ── USER MANAGEMENT SCREEN ──
function UserManager({ users, setUsers, onBack }) {
  const [editingId, setEditingId] = useState(null);
  const [form, setForm] = useState({ name: "", role: "team_lead", avatar: "👷", phone: "", title: "" });
  const [showEmojiPicker, setShowEmojiPicker] = useState(false);
  const [showAddForm, setShowAddForm] = useState(false);
  const nameRef = React.useRef(null);
  const titleRef = React.useRef(null);
  const phoneRef = React.useRef(null);

  const startEdit = (u) => {
    setEditingId(u.id);
    setForm({ name: u.name, role: u.role, avatar: u.avatar, phone: u.phone, title: u.title || "" });
    setShowAddForm(false);
  };

  const saveEdit = () => {
    if (!form.name.trim()) return;
    setUsers(prev => prev.map(u => u.id === editingId ? { ...u, ...form } : u));
    setEditingId(null);
  };

  const addUser = () => {
    if (!form.name.trim()) return;
    const newUser = { id: "user_" + Date.now(), ...form };
    setUsers(prev => [...prev, newUser]);
    setForm({ name: "", role: "team_lead", avatar: "👷", phone: "", title: "" });
    setShowAddForm(false);
  };

  const deleteUser = (id) => {
    if (id === "manager") return;
    if (window.confirm("למחוק משתמש זה?")) {
      setUsers(prev => prev.filter(u => u.id !== id));
    }
  };


  return (
    <div style={{ minHeight: "100vh", background: "#f5f6fa", fontFamily: "'Rubik',sans-serif", direction: "rtl" }}>
      <div style={{ background: "linear-gradient(135deg,#1a1a2e,#0f3460)", padding: "18px 18px 26px", color: "#fff" }}>
        <button onClick={onBack} style={{ background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", padding: "7px 14px", borderRadius: "10px", cursor: "pointer", fontSize: "14px", fontFamily: "'Rubik',sans-serif", marginBottom: "14px" }}>← חזרה</button>
        <h2 style={{ margin: 0, fontSize: "22px", fontWeight: "700" }}>👥 ניהול משתמשים</h2>
        <p style={{ margin: "5px 0 0", color: "rgba(255,255,255,0.5)", fontSize: "13px" }}>ערוך שמות, כינויים ותפקידים</p>
      </div>

      <div style={{ padding: "16px", maxWidth: "600px" }}>
        {users.map(u => (
          <div key={u.id} style={card}>
            {editingId === u.id ? (
              <EditUserForm form={form} setForm={setForm} onSave={saveEdit} onCancel={() => { setEditingId(null); }} isNew={false} />
            ) : (
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                  <span style={{ fontSize: "30px" }}>{u.avatar}</span>
                  <div>
                    <div style={{ fontWeight: "700", fontSize: "15px", color: "#1a1a2e" }}>{u.name}</div>
                    <div style={{ fontSize: "12px", color: "#999", marginTop: "2px" }}>{u.title || (u.role === "manager" ? "👑 מנהל" : "👷 ראש צוות")}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: "7px" }}>
                  <button onClick={() => startEdit(u)} style={{ padding: "7px 13px", background: "#f0f4ff", color: "#5B5EA6", border: "none", borderRadius: "9px", fontWeight: "600", fontSize: "13px", cursor: "pointer", fontFamily: "'Rubik',sans-serif" }}>✏️ ערוך</button>
                  {u.id !== "manager" && <button onClick={() => deleteUser(u.id)} style={{ padding: "7px 10px", background: "#fff0f0", color: "#C0392B", border: "none", borderRadius: "9px", fontSize: "13px", cursor: "pointer" }}>🗑️</button>}
                </div>
              </div>
            )}
          </div>
        ))}

        {showAddForm ? (
          <div style={card}>
            <div style={{ fontWeight: "700", fontSize: "15px", color: "#1a1a2e", marginBottom: "4px" }}>משתמש חדש</div>
            <EditUserForm form={form} setForm={setForm} onSave={addUser} onCancel={() => { setShowAddForm(false); }} isNew={true} />
          </div>
        ) : (
          <button onClick={() => { setShowAddForm(true); setForm({ name: "", role: "team_lead", avatar: "👷", phone: "" }); setEditingId(null); }}
            style={{ width: "100%", padding: "14px", background: "linear-gradient(135deg,#E07A2F,#c4621a)", color: "#fff", border: "none", borderRadius: "14px", fontSize: "15px", fontWeight: "700", cursor: "pointer", fontFamily: "'Rubik',sans-serif" }}>
            ➕ הוסף משתמש חדש
          </button>
        )}
      </div>
    </div>
  );
}

function App() {
  const [users, setUsers] = useState(DEFAULT_USERS);
  const [currentUser, setCurrentUser] = useState(null);
  const [tasks, setTasks] = useState(initialTasks);
  const [view, setView] = useState("tasks");
  const [selectedTaskId, setSelectedTaskId] = useState(null);
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterCategory, setFilterCategory] = useState("all");
  const [newTask, setNewTask] = useState({ title: "", description: "", category: "general", priority: "medium", project: "" });
  const [newComment, setNewComment] = useState("");
  const [toast, setToast] = useState("");
  const [activeTab, setActiveTab] = useState("tasks");
  const [archived, setArchived] = useState([]);
  const [showArchive, setShowArchive] = useState(false);

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2600); };
  const userName = (id) => users.find(u => u.id === id)?.name || id;
  const waGroup = (msg) => { if (WA_GROUP) window.open(WA_GROUP, "_blank"); else window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank"); };

  const filtered = tasks.filter(t => (filterStatus === "all" || t.status === filterStatus) && (filterCategory === "all" || t.category === filterCategory));
  const stats = { open: tasks.filter(t => t.status === "open").length, inprogress: tasks.filter(t => t.status === "inprogress").length, done: tasks.filter(t => t.status === "done").length, urgent: tasks.filter(t => t.priority === "high" && t.status !== "done").length };

  const archiveTask = (taskId) => {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    setArchived(p => [{ ...task, archivedAt: new Date().toISOString() }, ...p]);
    setTasks(p => p.filter(t => t.id !== taskId));
    setView("tasks");
    flash("🗂️ משימה הועברה לארכיון");
  };

  const addTask = () => {
    if (!newTask.title.trim()) return;
    const t = { id: Date.now(), ...newTask, status: "open", assignedTo: null, createdBy: currentUser.id, createdAt: new Date().toISOString(), comments: [] };
    setTasks(p => [t, ...p]);
    setNewTask({ title: "", description: "", category: "general", priority: "medium", project: "" });
    setView("tasks");
    flash("✅ משימה נוספה!");
    if (t.priority === "high") {
      setTimeout(() => {
        if (window.confirm("משימה דחופה! לשלוח התראת וואטסאפ לצוות?")) {
          const msg = `🚨 *משימה דחופה - שיקום נחל עוז*\n\n*${t.title}*\n${CATEGORIES[t.category].icon} ${CATEGORIES[t.category].label}\n📝 ${t.description}${t.project ? `\n📁 ${t.project}` : ""}\n\nמי יכול לקחת?`;
          waGroup(msg);
        }
      }, 400);
    }
  };

  const takeTask = (taskId) => {
    const task = tasks.find(t => t.id === taskId);
    setTasks(p => p.map(t => t.id === taskId ? { ...t, assignedTo: currentUser.id, status: "inprogress" } : t));
    flash("💪 לקחת את המשימה!");
    if (task) {
      setTimeout(() => {
        if (window.confirm("לשלוח עדכון למנהל בוואטסאפ?")) {
          const managerPhone = users.find(u => u.role === "manager")?.phone || "";
          wa(managerPhone, `👷 *לקיחת משימה*\n\n*${task.title}*\nנלקח ע"י: ${currentUser.name}\nסטטוס: בתהליך ⚙️`);
        }
      }, 300);
    }
  };

  const changeStatus = (taskId, status) => {
    const task = tasks.find(t => t.id === taskId);
    setTasks(p => p.map(t => t.id === taskId ? { ...t, status } : t));
    flash(status === "done" ? "🎉 משימה הושלמה!" : "🔄 סטטוס עודכן");
    if (task && status === "done") {
      setTimeout(() => {
        if (window.confirm("לשלוח אישור ביצוע לקבוצת וואטסאפ?")) {
          const cat = CATEGORIES[task.category];
          const msg = `✅ *משימה הושלמה - שיקום נחל עוז*\n\n${cat.icon} *${task.title}*\n📂 קטגוריה: ${cat.label}\n👷 בוצע ע"י: ${currentUser.name}${task.project ? `\n📁 ${task.project}` : ""}\n📅 ${new Date().toLocaleDateString("he-IL", { day: "2-digit", month: "2-digit", year: "numeric" })}`;
          waGroup(msg);
        }
      }, 300);
    } else if (task) {
      setTimeout(() => {
        if (window.confirm("לשלוח עדכון סטטוס למנהל בוואטסאפ?")) {
          const managerPhone = users.find(u => u.role === "manager")?.phone || "";
          wa(managerPhone, `📋 *עדכון משימה*\n\n*${task.title}*\nסטטוס: ${STATUS[status].label}\nע"י: ${currentUser.name}`);
        }
      }, 300);
    }
  };

  const addComment = (taskId) => {
    if (!newComment.trim()) return;
    const c = { id: Date.now(), userId: currentUser.id, text: newComment, createdAt: new Date().toISOString() };
    setTasks(p => p.map(t => t.id === taskId ? { ...t, comments: [...t.comments, c] } : t));
    setNewComment("");
    flash("💬 הערה נוספה!");
  };

  const genReport = () => {
    const done = tasks.filter(t => t.status === "done");
    const inprog = tasks.filter(t => t.status === "inprogress");
    const open = tasks.filter(t => t.status === "open");
    const urgent = tasks.filter(t => t.priority === "high" && t.status !== "done");
    let r = `📊 *דוח שבועי - שיקום נחל עוז*\n📅 ${new Date().toLocaleDateString("he-IL", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}\n\n━━━━━━━━━━━━━━━━━━━━\n✅ בוצע: ${done.length}\n⚙️ בתהליך: ${inprog.length}\n📋 פתוח: ${open.length}\n🔴 דחוף וממתין: ${urgent.length}\n━━━━━━━━━━━━━━━━━━━━\n\n`;
    if (done.length) { r += `*✅ הושלמו:*\n`; done.forEach(t => r += `• ${t.title}${t.assignedTo ? ` (${userName(t.assignedTo)})` : ""}\n`); r += "\n"; }
    if (urgent.length) { r += `*🔴 דחוף - ממתין:*\n`; urgent.forEach(t => r += `• ${t.title}\n`); r += "\n"; }
    users.filter(u => u.role === "team_lead").forEach(u => {
      const my = tasks.filter(t => t.assignedTo === u.id);
      if (my.length) r += `${u.avatar} ${u.name}: ✅${my.filter(t => t.status === "done").length} ⚙️${my.filter(t => t.status === "inprogress").length} 📋${my.filter(t => t.status === "open").length}\n`;
    });
    return r;
  };

  // ── USER MANAGER VIEW ──
  if (view === "users") return <UserManager users={users} setUsers={setUsers} onBack={() => setView("tasks")} />;

  if (view === "archive") return (
    <div style={{ minHeight: "100vh", background: "#f5f6fa", fontFamily: "'Rubik',sans-serif", direction: "rtl", paddingBottom: "30px" }}>
      <div style={{ background: "linear-gradient(135deg,#1a1a2e,#0f3460)", padding: "18px 18px 26px", color: "#fff" }}>
        <button onClick={() => setView("tasks")} style={{ background: "rgba(255,255,255,0.15)", border: "none", color: "#fff", padding: "7px 14px", borderRadius: "10px", cursor: "pointer", fontSize: "14px", fontFamily: "'Rubik',sans-serif", marginBottom: "14px" }}>← חזרה</button>
        <h2 style={{ margin: 0, fontSize: "20px", fontWeight: "700" }}>🗂️ ארכיון משימות</h2>
        <p style={{ margin: "5px 0 0", color: "rgba(255,255,255,0.5)", fontSize: "13px" }}>{archived.length} משימות מבוצעות</p>
      </div>
      <div style={{ padding: "14px", maxWidth: "600px" }}>
        {archived.length === 0 ? (
          <div style={{ textAlign: "center", padding: "60px 20px", color: "#ccc" }}>
            <div style={{ fontSize: "44px" }}>🗂️</div>
            <div style={{ fontSize: "15px", fontWeight: "600", marginTop: "10px" }}>הארכיון ריק</div>
          </div>
        ) : archived.map(task => {
          const cat = CATEGORIES[task.category];
          const assignee = users.find(u => u.id === task.assignedTo);
          return (
            <div key={task.id} style={{ background: "#fff", borderRadius: "14px", padding: "14px", marginBottom: "10px", boxShadow: "0 2px 8px rgba(0,0,0,0.04)", border: "1px solid #e8ffe8", opacity: 0.85 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "6px" }}>
                <span style={{ background: cat.bg, color: cat.color, padding: "3px 9px", borderRadius: "20px", fontSize: "11px", fontWeight: "600" }}>{cat.icon} {cat.label}</span>
                <span style={{ background: "#E6F4EE", color: "#2E7D5E", padding: "3px 9px", borderRadius: "20px", fontSize: "11px", fontWeight: "600" }}>✅ בוצע</span>
              </div>
              <h3 style={{ margin: "0 0 4px", fontSize: "14px", fontWeight: "600", color: "#333", textDecoration: "line-through" }}>{task.title}</h3>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: "11px", color: "#bbb", marginTop: "6px" }}>
                <span>{assignee ? `${assignee.avatar} ${assignee.name.split(" ")[0]}` : ""}</span>
                <span>הועבר לארכיון: {task.archivedAt ? new Date(task.archivedAt).toLocaleDateString("he-IL") : ""}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

    const stat = STATUS[task.status]; const cat = CATEGORIES[task.category];
    const canChange = currentUser.role === "manager" || task.assignedTo === currentUser.id;

    const assignee = users.find(u => u.id === task.assignedTo);

        </div>
        <div style={{ padding: "14px", maxWidth: "600px" }}>
          <div style={card}><Label>תיאור</Label><p style={{ margin: 0, color: "#333", lineHeight: "1.6", fontSize: "15px" }}>{task.description}</p></div>

          )}

            <div style={card}>
              <Label>עדכון סטטוס</Label>
              <div style={{ display: "flex", gap: "9px" }}>
                {Object.entries(STATUS).filter(([k]) => k !== task.status).map(([k, v]) => (
                  <button key={k} onClick={() => changeStatus(task.id, k)} style={{ flex: 1, padding: "11px", background: v.bg, color: v.color, border: `1.5px solid ${v.color}`, borderRadius: "10px", fontSize: "13px", fontWeight: "600", cursor: "pointer", fontFamily: "'Rubik',sans-serif" }}>{v.label}</button>

              </div>
            </div>

          </div>
        </div>
        <div style={{ marginBottom: "22px" }}>
          <label style={{ display: "block", fontSize: "13px", fontWeight: "600", color: "#444", marginBottom: "7px" }}>עדיפות</label>
          <div style={{ display: "flex", gap: "8px" }}>
            {Object.entries(PRIORITY).map(([k, v]) => (
              <button key={k} onClick={() => setNewTask(p => ({ ...p, priority: k }))} style={{ flex: 1, padding: "10px", border: `2px solid ${newTask.priority === k ? v.color : "#e0e0e0"}`, borderRadius: "12px", background: newTask.priority === k ? v.color : "#fff", color: newTask.priority === k ? "#fff" : "#666", cursor: "pointer", fontSize: "13px", fontWeight: "600", fontFamily: "'Rubik',sans-serif" }}>{v.label}</button>
            ))}
          </div>
          {newTask.priority === "high" && <div style={{ marginTop: "9px", padding: "9px 13px", background: "#FDECEA", borderRadius: "10px", fontSize: "12px", color: "#C0392B", fontWeight: "500" }}>📱 תישלח התראת וואטסאפ לאחר השמירה</div>}
        </div>
        <button onClick={addTask} disabled={!newTask.title.trim()} style={{ width: "100%", padding: "15px", background: newTask.title.trim() ? "linear-gradient(135deg,#0f3460,#1a1a2e)" : "#ccc", color: "#fff", border: "none", borderRadius: "14px", fontSize: "16px", fontWeight: "700", cursor: newTask.title.trim() ? "pointer" : "not-allowed", fontFamily: "'Rubik',sans-serif" }}>➕ הוסף משימה</button>
      </div>
    </div>
  );

  // ── REPORT ──
  const Report = () => {
    const done = tasks.filter(t => t.status === "done");
    const urgent = tasks.filter(t => t.priority === "high" && t.status !== "done");
    return (
      <div style={{ padding: "14px", maxWidth: "600px" }}>
        <div style={card}>
          <Label>סיכום שבוע</Label>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "11px" }}>
            {[{ label: "בוצע", val: stats.done, color: "#2E7D5E", bg: "#E6F4EE", icon: "✅" }, { label: "בתהליך", val: stats.inprogress, color: "#E07A2F", bg: "#FDF0E6", icon: "⚙️" }, { label: "פתוח", val: stats.open, color: "#5B5EA6", bg: "#EEEEF8", icon: "📋" }, { label: "דחוף וממתין", val: stats.urgent, color: "#C0392B", bg: "#FDECEA", icon: "🔴" }].map(s => (
              <div key={s.label} style={{ background: s.bg, borderRadius: "12px", padding: "14px", textAlign: "center" }}>
                <div style={{ fontSize: "26px", fontWeight: "700", color: s.color }}>{s.val}</div>
                <div style={{ fontSize: "11px", color: s.color, fontWeight: "600", marginTop: "2px" }}>{s.icon} {s.label}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={card}>
          <Label>לפי ראש צוות</Label>
          {users.filter(u => u.role === "team_lead").map(u => {
            const my = tasks.filter(t => t.assignedTo === u.id);
            return (
              <div key={u.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px", background: "#f8f9ff", borderRadius: "10px", marginBottom: "8px" }}>
                <div style={{ fontWeight: "600", fontSize: "14px" }}>{u.avatar} {u.name}</div>
                <div style={{ display: "flex", gap: "8px", fontSize: "13px" }}>
                  {my.filter(t => t.status === "done").length > 0 && <span style={{ color: "#2E7D5E", fontWeight: "600" }}>✅ {my.filter(t => t.status === "done").length}</span>}
                  {my.filter(t => t.status === "inprogress").length > 0 && <span style={{ color: "#E07A2F", fontWeight: "600" }}>⚙️ {my.filter(t => t.status === "inprogress").length}</span>}
                  {my.filter(t => t.status === "open").length > 0 && <span style={{ color: "#5B5EA6", fontWeight: "600" }}>📋 {my.filter(t => t.status === "open").length}</span>}
                  {my.length === 0 && <span style={{ color: "#ccc" }}>אין משימות</span>}
                </div>
              </div>
            );
          })}
        </div>
        {urgent.length > 0 && (
          <div style={{ background: "#FDECEA", borderRadius: "16px", padding: "18px", marginBottom: "14px" }}>
            <Label>🔴 דחוף — ממתין לטיפול</Label>
            {urgent.map(t => (
              <div key={t.id} style={{ background: "#fff", borderRadius: "10px", padding: "10px 13px", marginBottom: "7px" }}>
                <div style={{ fontWeight: "600", fontSize: "14px", color: "#333" }}>{t.title}</div>
                <div style={{ fontSize: "12px", color: "#999", marginTop: "2px" }}>{t.assignedTo ? `👷 ${userName(t.assignedTo)}` : "⚡ לא משויך"}</div>
              </div>
            ))}
          </div>
        )}
        {done.length > 0 && (
          <div style={card}>
            <Label>✅ משימות שהושלמו</Label>
            {done.map(t => (
              <div key={t.id} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid #f0f0f0" }}>
                <span style={{ fontSize: "14px", color: "#333" }}>{t.title}</span>
                {t.assignedTo && <span style={{ fontSize: "12px", color: "#999" }}>{userName(t.assignedTo).split(" ")[0]}</span>}
              </div>
            ))}
          </div>
        )}
        <button onClick={() => wa(users.find(u=>u.role==="manager")?.phone||"", genReport())} style={{ width: "100%", padding: "15px", background: "#25D366", color: "#fff", border: "none", borderRadius: "14px", fontSize: "15px", fontWeight: "700", cursor: "pointer", fontFamily: "'Rubik',sans-serif", display: "flex", alignItems: "center", justifyContent: "center", gap: "9px" }}>
          <span style={{ fontSize: "20px" }}>📱</span> שלח דוח בוואטסאפ
        </button>
      </div>
    );
  };

  // ── MAIN ──

            <div>
              <div style={{ fontSize: "11px", color: "rgba(255,255,255,0.45)", marginBottom: "1px" }}>שלום, {currentUser.name || (currentUser.role === "manager" ? "מנהל" : "ראש צוות")}</div>
              <div style={{ fontSize: "15px", fontWeight: "700" }}>שיקום נחל עוז</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: "7px" }}>
            {currentUser.role === "manager" && (
              <button onClick={() => setView("users")} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "rgba(255,255,255,0.8)", padding: "6px 11px", borderRadius: "10px", cursor: "pointer", fontSize: "13px", fontFamily: "'Rubik',sans-serif" }}>👥</button>
            )}
            <button onClick={() => setView("archive")} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "rgba(255,255,255,0.8)", padding: "6px 11px", borderRadius: "10px", cursor: "pointer", fontSize: "13px", fontFamily: "'Rubik',sans-serif" }}>🗂️{archived.length > 0 ? ` ${archived.length}` : ""}</button>
            <button onClick={() => setCurrentUser(null)} style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "rgba(255,255,255,0.6)", padding: "6px 12px", borderRadius: "10px", cursor: "pointer", fontSize: "13px", fontFamily: "'Rubik',sans-serif" }}>יציאה</button>
          </div>
        </div>
        <div style={{ display: "flex", gap: "8px" }}>
          {[{ l: "פתוח", v: stats.open }, { l: "בתהליך", v: stats.inprogress }, { l: "בוצע", v: stats.done }, { l: "דחוף", v: stats.urgent }].map(s => (
            <div key={s.l} style={{ flex: 1, background: "rgba(255,255,255,0.08)", borderRadius: "11px", padding: "9px 4px", textAlign: "center", border: "1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ fontSize: "19px", fontWeight: "700" }}>{s.v}</div>
              <div style={{ fontSize: "9px", color: "rgba(255,255,255,0.45)", marginTop: "2px" }}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ background: "#fff", borderBottom: "1px solid #f0f0f0", display: "flex" }}>
        {[{ k: "tasks", l: "📋 משימות" }, { k: "report", l: "📊 דוח שבועי" }].map(tab => (
          <button key={tab.k} onClick={() => setActiveTab(tab.k)} style={{ flex: 1, padding: "13px", border: "none", background: "none", fontSize: "14px", fontWeight: "600", cursor: "pointer", fontFamily: "'Rubik',sans-serif", color: activeTab === tab.k ? "#0f3460" : "#999", borderBottom: `2.5px solid ${activeTab === tab.k ? "#0f3460" : "transparent"}` }}>{tab.l}</button>
        ))}
      </div>

      {activeTab === "report" ? <Report /> : (
        <>
          <div style={{ padding: "11px 13px 0", background: "#fff", borderBottom: "1px solid #f0f0f0" }}>
            <div style={{ display: "flex", gap: "7px", overflowX: "auto", paddingBottom: "9px" }}>
              <button onClick={() => setFilterStatus("all")} style={fBtn(filterStatus === "all", "#1a1a2e")}>הכל ({tasks.length})</button>
              {Object.entries(STATUS).map(([k, v]) => <button key={k} onClick={() => setFilterStatus(k === filterStatus ? "all" : k)} style={fBtn(filterStatus === k, v.color)}>{v.label}</button>)}
            </div>
            <div style={{ display: "flex", gap: "7px", overflowX: "auto", paddingBottom: "9px" }}>
              <button onClick={() => setFilterCategory("all")} style={fBtn(filterCategory === "all", "#555", true)}>כל הסוגים</button>
              {Object.entries(CATEGORIES).map(([k, v]) => <button key={k} onClick={() => setFilterCategory(k === filterCategory ? "all" : k)} style={fBtn(filterCategory === k, v.color, true)}>{v.icon} {v.label}</button>)}
            </div>
          </div>

          <div style={{ padding: "13px", maxWidth: "600px" }}>
            {filtered.length === 0
              ? <div style={{ textAlign: "center", padding: "60px 20px", color: "#ccc" }}><div style={{ fontSize: "44px" }}>✅</div><div style={{ fontSize: "15px", fontWeight: "600", marginTop: "10px" }}>אין משימות</div></div>
              : filtered.map(task => {
                const cat = CATEGORIES[task.category]; const stat = STATUS[task.status];
                const assignee = users.find(u => u.id === task.assignedTo);
                const canTake = currentUser.role === "team_lead" && !task.assignedTo && task.status === "open";
                return (
                  <div key={task.id} onClick={() => { setSelectedTaskId(task.id); setView("detail"); }} style={{ background: "#fff", borderRadius: "15px", padding: "14px", marginBottom: "10px", boxShadow: "0 2px 9px rgba(0,0,0,0.05)", border: "1px solid #f0f0f0", cursor: "pointer" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "7px" }}>
                      <div style={{ display: "flex", gap: "5px", flexWrap: "wrap" }}>
                        <span style={{ background: cat.bg, color: cat.color, padding: "3px 9px", borderRadius: "20px", fontSize: "11px", fontWeight: "600" }}>{cat.icon} {cat.label}</span>
                        {task.priority === "high" && <span style={{ background: "#FDECEA", color: "#C0392B", padding: "3px 8px", borderRadius: "20px", fontSize: "11px", fontWeight: "600" }}>🔴</span>}
                        {task.comments.length > 0 && <span style={{ background: "#EEF2FF", color: "#5B5EA6", padding: "3px 8px", borderRadius: "20px", fontSize: "11px" }}>💬 {task.comments.length}</span>}
                      </div>
                      <span style={{ background: stat.bg, color: stat.color, padding: "3px 9px", borderRadius: "20px", fontSize: "11px", fontWeight: "600", whiteSpace: "nowrap" }}>{stat.label}</span>
                    </div>
                    <h3 style={{ margin: "0 0 4px", fontSize: "15px", fontWeight: "600", color: "#1a1a2e" }}>{task.title}</h3>
                    <p style={{ margin: "0 0 9px", fontSize: "13px", color: "#777", lineHeight: "1.4" }}>{task.description.substring(0, 75)}{task.description.length > 75 ? "..." : ""}</p>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: "11px", color: "#bbb" }}>{fmt(task.createdAt)}</span>
                      {assignee ? <span style={{ fontSize: "12px", color: "#444", fontWeight: "500" }}>{assignee.avatar} {assignee.name.split(" ")[0]}</span> : <span style={{ fontSize: "11px", color: "#C0392B", fontWeight: "500" }}>⚡ לא משויך</span>}
                    </div>
                    {canTake && <button onClick={e => { e.stopPropagation(); takeTask(task.id); }} style={{ width: "100%", marginTop: "10px", padding: "10px", background: "linear-gradient(135deg,#0f3460,#1a1a2e)", color: "#fff", border: "none", borderRadius: "10px", fontSize: "13px", fontWeight: "600", cursor: "pointer", fontFamily: "'Rubik',sans-serif" }}>💪 לקח על עצמי</button>}
                  </div>
                );
              })
            }
          </div>
        </>
      )}

      {currentUser.role === "manager" && (
        <button onClick={() => setView("add")} style={{ position: "fixed", bottom: "22px", left: "50%", transform: "translateX(-50%)", background: "linear-gradient(135deg,#E07A2F,#c4621a)", color: "#fff", border: "none", borderRadius: "30px", padding: "14px 28px", fontSize: "15px", fontWeight: "700", boxShadow: "0 8px 26px rgba(224,122,47,0.42)", cursor: "pointer", fontFamily: "'Rubik',sans-serif", whiteSpace: "nowrap" }}>
          ➕ משימה חדשה
        </button>
      )}
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>
</body>
